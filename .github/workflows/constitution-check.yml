name: constitution-check

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  constitution:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest pyyaml httpx

      - name: Constitution boundary check
        run: python3 scripts/testing/check_constitution_boundaries.py

      - name: Core constitution tests
        run: |
          set -e
          python3 --version
          python3 -c "import sys; print(sys.executable)"
          python3 -c "import core.agent.base_agent, core.runtime.constitution; print('import-ok')"
          echo '=== test_skill_manager_smoke ==='
          python3 -m pytest -vv core/tests/test_skill_manager_smoke.py
          echo '=== test_base_agent_constitution ==='
          python3 -m pytest -vv core/tests/test_base_agent_constitution.py
          echo '=== test_constitution_runtime ==='
          python3 -m pytest -vv core/tests/test_constitution_runtime.py
